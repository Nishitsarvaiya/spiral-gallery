<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Spiral Gallery</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
		<link rel="stylesheet" href="/src/style.css" />
	</head>
	<body>
		<canvas id="gl-canvas"></canvas>

		<div class="scroll-container">
			<div class="scroll-content"></div>
		</div>

		<!-- Brand -->
		<div class="brand">
			<span class="brand__text">By Nishit</span>
		</div>

		<!-- Image counter -->
		<div class="counter">
			<span class="counter__current" id="js-counter">01</span>
			<span class="counter__sep"></span>
			<span class="counter__total">12</span>
		</div>

		<!-- Page label -->
		<div class="page-label">
			<span class="page-label__title">Three.js</span>
		</div>

		<!-- Page Links -->
		<div class="page-links">
			<div>
				<a href="/">Three.js</a>
			</div>
			<div>
				<a href="/gsap-gallery">GSAP</a>
			</div>
		</div>

		<!-- Minimap — right centre -->
		<div class="minimap-wrap" id="js-minimap-wrap">
			<canvas class="minimap" id="js-minimap" width="70" height="420"></canvas>
			<div class="minimap-cursor" id="js-minimap-cursor"></div>
		</div>

		<!-- Loader -->
	<div class="loader" id="js-loader">
		<div class="loader__bar"><div class="loader__fill" id="js-loader-fill"></div></div>
		<span class="loader__count" id="js-loader-count">0 / 12</span>
	</div>

	<script type="module" src="/src/main.js"></script>
	</body>
</html>
